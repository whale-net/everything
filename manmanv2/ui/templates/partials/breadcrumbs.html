{{define "breadcrumbs"}}
{{if .Breadcrumbs}}
<nav class="flex mb-6" aria-label="Breadcrumb">
    <ol class="inline-flex items-center space-x-1 md:space-x-3">
        {{range $index, $crumb := .Breadcrumbs}}
        <li class="inline-flex items-center">
            {{if ne $index 0}}
            <svg class="w-3 h-3 text-gray-400 mx-1" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
            </svg>
            {{end}}
            {{if .URL}}
            <a href="{{.URL}}" class="inline-flex items-center text-sm font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">
                {{if .Icon}}<span class="mr-1">{{.Icon}}</span>{{end}}
                {{.Label}}
            </a>
            {{else}}
            <span class="inline-flex items-center text-sm font-medium text-gray-500 dark:text-gray-400">
                {{if .Icon}}<span class="mr-1">{{.Icon}}</span>{{end}}
                {{.Label}}
            </span>
            {{end}}
        </li>
        {{end}}
    </ol>
</nav>
{{end}}
{{end}}
