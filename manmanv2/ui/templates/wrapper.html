<!-- Theme initialization script - must run before body renders -->
<script>
(function() {
    const theme = localStorage.getItem('manman-theme') || 
                  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    // Apply dark class for Tailwind dark mode
    if (theme === 'night' || theme === 'oled') {
        document.documentElement.classList.add('dark');
    }
})();
</script>

<div id="toast" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

<script>
// Theme management
(function() {
    const themeButton = document.getElementById('theme-button');
    const themeMenu = document.getElementById('theme-menu');
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('manman-theme', theme);
        
        // Update dark class for Tailwind
        if (theme === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    }

    // Theme switcher (desktop)
    if (themeButton && themeMenu) {
        themeButton.addEventListener('click', () => {
            themeMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!themeButton.contains(e.target) && !themeMenu.contains(e.target)) {
                themeMenu.classList.add('hidden');
            }
        });

        themeMenu.querySelectorAll('[data-theme]').forEach(btn => {
            btn.addEventListener('click', () => {
                setTheme(btn.dataset.theme);
                themeMenu.classList.add('hidden');
            });
        });
    }

    // Theme switcher (mobile)
    document.querySelectorAll('.mobile-theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            setTheme(btn.dataset.theme);
        });
    });

    // Mobile menu toggle
    if (mobileMenuButton && mobileMenu) {
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    }

    // Initialize theme on load
    const savedTheme = localStorage.getItem('manman-theme');
    if (savedTheme) {
        setTheme(savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('night');
    }
})();
</script>
