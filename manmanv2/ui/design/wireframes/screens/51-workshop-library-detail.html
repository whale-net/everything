<!-- wf: name="workshop-library-detail" title="Library: Essential Maps" -->
<div class="breadcrumbs text-sm mb-4">
  <ul><li><a href="#/workshop">Workshop</a></li><li>Essential Maps</li></ul>
</div>

<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl md:text-3xl font-bold">Essential Maps</h1>
  <button class="btn btn-primary">Edit Library</button>
</div>

<div class="card bg-base-100 shadow-md mb-6">
  <div class="card-body p-0">
    <div class="flex justify-between items-center p-4 border-b border-base-300">
      <h2 class="text-lg font-semibold">Addons in Library <span class="badge badge-ghost">12</span></h2>
      <input type="text" class="input input-bordered input-sm w-52" placeholder="Filter addons...">
    </div>
    <table class="table">
      <thead><tr><th>Addon</th><th>Workshop ID</th><th class="text-right">Actions</th></tr></thead>
      <tbody>
        <tr class="hover"><td><a href="#/workshop-addon-detail" class="link link-primary">Midgard Extended</a></td><td class="font-mono text-sm">2812004411</td><td class="text-right"><button class="btn btn-sm btn-error">Remove</button></td></tr>
        <tr class="hover"><td><a href="#/workshop-addon-detail" class="link link-primary">Deep Fjords</a></td><td class="font-mono text-sm">2901733208</td><td class="text-right"><button class="btn btn-sm btn-error">Remove</button></td></tr>
        <tr class="hover"><td><a href="#/workshop-addon-detail" class="link link-primary">Ashlands Preview</a></td><td class="font-mono text-sm">3100488121</td><td class="text-right"><button class="btn btn-sm btn-error">Remove</button></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="card bg-base-100 shadow-md mb-6 max-w-2xl">
  <div class="card-body">
    <h2 class="card-title text-lg">Add Addons</h2>
    <div class="flex gap-2">
      <input type="text" class="input input-bordered flex-1" placeholder="Filter addons...">
      <button class="btn btn-primary">Add Selected</button>
    </div>
  </div>
</div>

<div class="card bg-base-100 border-2 border-error/40 shadow-md mt-8">
  <div class="bg-error/10 px-6 py-4 border-b-2 border-error/40 rounded-t-box">
    <h3 class="text-lg font-semibold text-error">⚠️ Danger Zone</h3>
  </div>
  <div class="card-body">
    <h4 class="font-semibold">Delete this library</h4>
    <p class="text-sm opacity-70 mb-2">Removes the library (addons themselves are kept). This cannot be undone.</p>
    <div><button class="btn btn-error">Delete Library</button></div>
  </div>
</div>
