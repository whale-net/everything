syntax = "proto3";

package manman.v1;

option go_package = "github.com/whale-net/everything/manmanv2/protos;manmanpb";

import "manmanv2/protos/messages.proto";

// ============================================================================
// Backup RPCs
// ============================================================================

message CreateBackupRequest {
  int64 session_id = 1;  // Session to backup
  string description = 2;  // Optional description
}

message CreateBackupResponse {
  Backup backup = 1;
}

message ListBackupsRequest {
  int64 server_game_config_id = 1;  // Filter by SGC (optional)
  int64 session_id = 2;  // Filter by session (optional)
  int32 page_size = 3;
  string page_token = 4;
}

message ListBackupsResponse {
  repeated Backup backups = 1;
  string next_page_token = 2;
}

message GetBackupRequest {
  int64 backup_id = 1;
}

message GetBackupResponse {
  Backup backup = 1;
}

message DeleteBackupRequest {
  int64 backup_id = 1;
}

message DeleteBackupResponse {
  // Empty - success indicated by no error
}

message TriggerBackupRequest {
  int64 server_game_config_id = 1;
  int64 backup_config_id = 2;
}

message TriggerBackupResponse {
  int64 backup_id = 1;
}

// ============================================================================
// BackupConfig RPCs
// ============================================================================

message CreateBackupConfigRequest {
  int64 volume_id = 1;
  int32 cadence_minutes = 2;
  string backup_path = 3;
  bool enabled = 4;
}

message CreateBackupConfigResponse {
  BackupConfig config = 1;
}

message GetBackupConfigRequest {
  int64 backup_config_id = 1;
}

message GetBackupConfigResponse {
  BackupConfig config = 1;
}

message ListBackupConfigsRequest {
  int64 volume_id = 1;
}

message ListBackupConfigsResponse {
  repeated BackupConfig configs = 1;
}

message UpdateBackupConfigRequest {
  int64 backup_config_id = 1;
  int32 cadence_minutes = 2;
  string backup_path = 3;
  bool enabled = 4;
}

message UpdateBackupConfigResponse {
  BackupConfig config = 1;
}

message DeleteBackupConfigRequest {
  int64 backup_config_id = 1;
}

message DeleteBackupConfigResponse {}

message AddBackupConfigActionRequest {
  int64 backup_config_id = 1;
  int64 action_id = 2;
  int32 display_order = 3;
}

message AddBackupConfigActionResponse {}

message RemoveBackupConfigActionRequest {
  int64 backup_config_id = 1;
  int64 action_id = 2;
}

message RemoveBackupConfigActionResponse {}

message ListBackupConfigActionsRequest {
  int64 backup_config_id = 1;
}

message ListBackupConfigActionsResponse {
  repeated int64 action_ids = 1;
  repeated int32 display_orders = 2;
}
