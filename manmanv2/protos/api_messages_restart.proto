syntax = "proto3";

package manman.v1;

option go_package = "github.com/whale-net/everything/manmanv2/protos;manmanpb";

// ============================================================================
// RestartSchedule RPCs
// ============================================================================

message CreateRestartScheduleRequest {
  int64 server_game_config_id = 1;
  int32 cadence_minutes = 2;
  bool  enabled = 3;
}

message CreateRestartScheduleResponse {
  RestartSchedule schedule = 1;
}

message GetRestartScheduleRequest {
  int64 restart_schedule_id = 1;
}

message GetRestartScheduleResponse {
  RestartSchedule schedule = 1;
}

message ListRestartSchedulesRequest {
  int64 server_game_config_id = 1;
}

message ListRestartSchedulesResponse {
  repeated RestartSchedule schedules = 1;
}

message UpdateRestartScheduleRequest {
  int64 restart_schedule_id = 1;
  int32 cadence_minutes = 2;
  bool  enabled = 3;
}

message UpdateRestartScheduleResponse {
  RestartSchedule schedule = 1;
}

message DeleteRestartScheduleRequest {
  int64 restart_schedule_id = 1;
}

message DeleteRestartScheduleResponse {}

// RestartSchedule defines a scheduled restart for a ServerGameConfig
message RestartSchedule {
  int64 restart_schedule_id = 1;
  int64 server_game_config_id = 2;
  int32 cadence_minutes = 3;
  bool  enabled = 4;
  int64 last_restart_at = 5;  // Unix timestamp, 0 if never
  int64 created_at = 6;
  int64 updated_at = 7;
}
