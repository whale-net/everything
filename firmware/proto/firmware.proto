syntax = "proto3";
package firmware;

// ── Sensor types ─────────────────────────────────────────────────────────────

enum SensorType {
  SENSOR_TYPE_UNKNOWN     = 0;
  SENSOR_TYPE_ILLUMINANCE = 1;  // lx  — BH1750 and similar
  SENSOR_TYPE_TEMPERATURE = 2;  // °C  — thermistor and similar
  SENSOR_TYPE_HUMIDITY    = 3;  // %RH
  SENSOR_TYPE_ECO2        = 4;  // ppm — CCS811 and similar
  SENSOR_TYPE_TVOC        = 5;  // ppb — CCS811 and similar
}

// ── Device manifest ───────────────────────────────────────────────────────────
// Published retained on connect. Describes the board's sensor complement so
// processors can register entities without knowing the firmware source.

message SensorDescriptor {
  string     name = 1;  // unique on this device, e.g. "light_canopy"
  SensorType type = 2;
  string     unit = 3;  // SI unit string, e.g. "lx", "°C"
}

message DeviceManifest {
  string device_id = 1;
  repeated SensorDescriptor sensors = 2;
}

// ── Sensor reading ────────────────────────────────────────────────────────────
// Published per sensor each loop.

message SensorReading {
  float  value     = 1;
  uint32 uptime_ms = 2;  // millis() on the device — useful for staleness detection
}
