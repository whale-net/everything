syntax = "proto3";
package firmware;

import "firmware/proto/firmware.proto";

// ChipType identifies which IC driver the device should instantiate.
// Values must stay in sync with the chip names in chips.yaml — the
// catalog_sync_test enforces this at CI time.
// UNKNOWN = legacy patch-only (applies name/enabled overrides to a sensor that
// was already compiled in; no new sensor instance is created).
enum ChipType {
  CHIP_TYPE_UNKNOWN = 0;
  CHIP_TYPE_BH1750  = 1;
  CHIP_TYPE_SHT3X   = 2;
  CHIP_TYPE_CCS811  = 3;
}

// One step in a cascaded I2C mux chain.
// Path is ordered outer → inner: mux_path[0] is the first mux from the root
// bus; mux_path[len-1] is the mux the sensor hangs off directly.
message MuxHop {
  uint32 mux_address = 1;
  uint32 mux_channel = 2;
}

// Logical configuration for one physical sensor.
//
// chip_type identifies which IC driver to instantiate.  sensor_type
// discriminates virtual sensors that share an I2C address (SHT3x temp vs
// humidity, CCS811 eCO2 vs TVOC).  For single-ISensor chips (BH1750) leave
// sensor_type as SENSOR_TYPE_UNKNOWN.
message SensorConfig {
  repeated MuxHop mux_path    = 1;  // empty = sensor directly on root bus
  uint32 i2c_address          = 2;
  string name                 = 3;  // logical name in MQTT topics + manifest
  optional bool enabled       = 4;
  uint32 poll_interval_ms     = 5;  // 0 = use device default
  SensorType sensor_type      = 6;  // discriminator for multi-virtual chips
  uint32 region_id            = 7;  // server-side only; device ignores this field
  ChipType chip_type          = 8;  // which IC driver to instantiate
}

// Pushed from server to device via MQTT topic leaflab/<device_id>/config.
message DeviceConfig {
  string device_id              = 1;
  uint64 version                = 2;  // monotonic; device rejects version <= current
  repeated SensorConfig sensors = 3;
}

// Published by device after applying or rejecting a DeviceConfig push.
// Topic: leaflab/<device_id>/config/ack
message DeviceConfigAck {
  string device_id       = 1;
  uint64 applied_version = 2;
  bool   accepted        = 3;
  string reason          = 4;  // human-readable rejection reason when accepted=false
}
