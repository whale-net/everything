<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.3/dist/index.global.js"></script>
<style type="text/tailwindcss">@import "tailwindcss";</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@5.6.18/daisyui.css">
<style>{{.ThemesCSS}}</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
{{range .Screens}}<section class="wf-screen" data-wf="{{.Name}}" data-wf-title="{{.Title}}" hidden>
{{.Body}}
</section>
{{end}}
<!-- kit chrome: screen index + theme cycle -->
<div class="fixed bottom-4 right-4 z-50 flex gap-2">
  <div class="dropdown dropdown-top dropdown-end">
    <div tabindex="0" role="button" class="btn btn-sm btn-neutral shadow-lg">Screens</div>
    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-56 p-2 shadow-lg border border-base-300">
      {{range .Screens}}<li><a href="#/{{.Name}}">{{.Title}}</a></li>
      {{end}}
    </ul>
  </div>
  <button id="wf-theme" class="btn btn-sm btn-neutral shadow-lg">theme: light</button>
</div>
<script>
(function () {
  var screens = Array.prototype.slice.call(document.querySelectorAll('.wf-screen'));
  function show() {
    var n = location.hash.replace(/^#\//, '');
    var t = screens[0];
    for (var i = 0; i < screens.length; i++) if (screens[i].dataset.wf === n) t = screens[i];
    screens.forEach(function (s) { s.hidden = s !== t; });
    document.title = t.dataset.wfTitle + ' — ' + {{printf "%q" .Title}};
    document.querySelectorAll('a[href^="#/"]').forEach(function (a) {
      a.classList.toggle('menu-active', a.getAttribute('href') === '#/' + t.dataset.wf);
    });
    window.scrollTo(0, 0);
  }
  window.addEventListener('hashchange', show);
  show();

  var themes = ['light', 'night', 'oled'];
  var btn = document.getElementById('wf-theme');
  function setTheme(t) {
    document.documentElement.dataset.theme = t;
    btn.textContent = 'theme: ' + t;
    try { localStorage.setItem('wf-theme', t); } catch (e) {}
  }
  btn.addEventListener('click', function () {
    var i = themes.indexOf(document.documentElement.dataset.theme);
    setTheme(themes[(i + 1) % themes.length]);
  });
  var saved = null;
  try { saved = localStorage.getItem('wf-theme'); } catch (e) {}
  setTheme(themes.indexOf(saved) >= 0 ? saved : 'light');
})();
</script>
</body>
</html>
