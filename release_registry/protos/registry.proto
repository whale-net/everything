syntax = "proto3";

package release_registry.v1;

option go_package = "github.com/whale-net/everything/release_registry/protos;registrypb";

// ============================================================================
// Registry Service — release registry API
//
// The release registry tracks application metadata, git commits, container
// artifacts and promotes them to environments.  Consumers (ArgoCD plugin,
// dashboard) use Resolve() to discover which artifact version is active for a
// given app + environment.
// ============================================================================

enum ArtifactKind {
  ARTIFACT_KIND_UNSPECIFIED = 0;
  IMAGE                       = 1;
  HELM_CHART                  = 2;
}

// Application metadata — canonical key is domain + "-" + name (matches
// tools/bazel/release.bzl's image_name convention).
message AppMetadata {
  string domain    = 1;  // e.g. "games" or "infra"
  string name      = 2;  // short app name, e.g. "manmanv2"
  string registry  = 3;  // container registry host (defaults "ghcr.io")
  string organization = 4;  // org / namespace (defaults "whale-net")
}

// ---------------------------------------------------------------------------
// RPC: RegisterApp
// ---------------------------------------------------------------------------

message RegisterAppRequest {
  AppMetadata metadata = 1;
}

message RegisterAppResponse {
  string key    = 1;  // canonical "domain-name" key, echoed back
}

// ---------------------------------------------------------------------------
// RPC: RegisterCommit
// ---------------------------------------------------------------------------

// Timestamps use int64 Unix seconds — matching the existing convention across
// manmanv2 protos (messages.proto, api_messages_*.proto) rather than
// google.protobuf.Timestamp.  No proto file in this repo imports well-known
// types yet; keeping it uniform avoids adding a new transitive dependency on
// rules_proto/google_api for a single field while the registry is still being
// scaffolded.

message RegisterCommitRequest {
  string repo     = 1;  // git remote URL or short name
  string sha      = 2;  // full commit SHA (hex)
  string ref      = 3;  // branch / tag / ref name
  int64 timestamp = 4;  // Unix seconds (0 = now on server)
}

message RegisterCommitResponse {
  string key        = 1;  // "repo:sha" ack
  int64 registered_at = 2;  // Unix seconds when the commit was stored
}

// ---------------------------------------------------------------------------
// RPC: RegisterArtifact
// ---------------------------------------------------------------------------

message RegisterArtifactRequest {
  string app       = 1;  // canonical "domain-name" key
  ArtifactKind kind   = 2;
  string sha      = 3;  // commit SHA the artifact was built from
}

message RegisterArtifactResponse {
  string version  = 1;  // computed next version (e.g. "0.1.0")
}

// ---------------------------------------------------------------------------
// RPC: Promote
// ---------------------------------------------------------------------------

message PromoteRequest {
  string app       = 1;  // canonical "domain-name" key
  string env      = 2;  // e.g. "dev", "staging", "prod"
  ArtifactKind kind   = 3;
  string version  = 4;  // the version being promoted
}

message PromoteResponse {
  int64 valid_from    = 1;  // Unix seconds — when this promotion became active
}

// ---------------------------------------------------------------------------
// RPC: Resolve
// ---------------------------------------------------------------------------

message ResolveRequest {
  string app       = 1;
  string env      = 2;
  ArtifactKind kind   = 3;
}

message ResolveResponse {
  string version    = 1;
  string sha        = 2;
  int64 promoted_at  = 3;  // Unix seconds of the active promotion
}
